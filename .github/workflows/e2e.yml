name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Typecheck and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: padel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d padel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      TEST_RESET_TOKEN: local-test-token
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

  e2e:
    name: Playwright shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/4", "2/4", "3/4", "4/4"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: padel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d padel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      TEST_RESET_TOKEN: local-test-token
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Run Playwright shard
        run: npx playwright test --grep-invert @prod-smoke --project=chromium --shard=${{ matrix.shard }} --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ strategy.job-index }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
