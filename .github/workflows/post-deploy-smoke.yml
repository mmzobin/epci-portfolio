name: Post-Deploy Smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: Production or preview URL to smoke test
        required: true
        type: string

concurrency:
  group: post-deploy-smoke-${{ github.event.inputs.base_url || github.event.deployment_status.environment_url || github.run_id }}
  cancel-in-progress: true

jobs:
  production-smoke:
    name: Production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.deployment_status.state == 'success' &&
        (
          github.event.deployment.environment == 'Production' ||
          github.event.deployment.environment == 'production'
        ) &&
        github.event.deployment_status.environment_url != ''
      )
    env:
      BASE_URL: ${{ github.event.inputs.base_url || secrets.PRODUCTION_BASE_URL || github.event.deployment_status.environment_url }}
      PLAYWRIGHT_SKIP_WEB_SERVER: "1"
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Print smoke target
        run: |
          node -e "const url = process.env.BASE_URL || ''; console.log(`Post-deploy smoke target: ${url}`); if (!url) { console.error('BASE_URL is empty'); process.exit(1); }"

      - name: Run production smoke
        run: npx playwright test tests/prod-smoke.spec.ts --grep @prod-smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
