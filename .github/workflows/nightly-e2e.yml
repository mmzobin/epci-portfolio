name: Nightly E2E Regression

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-e2e-regression
  cancel-in-progress: false

jobs:
  nightly-regression:
    name: Nightly shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/4", "2/4", "3/4", "4/4"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: padel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d padel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/padel_test
      TEST_RESET_TOKEN: local-test-token
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Run nightly regression shard
        run: npx playwright test --grep-invert @prod-smoke --project=chromium --shard=${{ matrix.shard }} --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report-${{ strategy.job-index }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results-${{ strategy.job-index }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 30
